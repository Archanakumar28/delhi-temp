<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Archive</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

/* (UNCHANGED — YOUR CSS EXACTLY SAME) */

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: #E0CFC2;
  color: #2c2c2c;
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 8%;
  background: #62191C;
  color: #E0CFC2;
}

nav ul {
  display: flex;
  gap: 20px;
  list-style: none;
}

nav a {
  color: #E0CFC2;
  text-decoration: none;
}

.content {
  text-align: center;
  padding: 60px 20px 20px;
}

.content h2 {
  font-family: 'Playfair Display', serif;
  color: #62191C;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  padding: 40px 8%;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.4s;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.1);
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(98,25,28,0.75);
  color: #E0CFC2;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: 0.4s;
  text-align: center;
  padding: 20px;
}

.card:hover .overlay {
  opacity: 1;
}

.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  padding-top: 80px;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
}

.modal-content {
  display: block;
  margin: auto;
  max-width: 80%;
}

#modal-caption {
  text-align: center;
  color: #fff;
  margin-top: 10px;
}

.close {
  position: absolute;
  top: 20px;
  right: 40px;
  color: white;
  font-size: 30px;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 20px;
  background: #62191C;
  color: #E0CFC2;
}

.fade-section {
  opacity: 0;
  transform: translateY(40px);
  transition: 0.8s;
}

.fade-section.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<nav>
  <h1>Ephemeral Delhi</h1>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="archive.html">Archive</a></li>
    <li><a href="map.html">Map</a></li>
    <li><a href="analysis.html">Analysis</a></li>
  </ul>
</nav>

<section class="content fade-section">
<h2>Archive</h2>
<p>Each entry captures a structure that briefly transformed space.</p>
</section>

<!-- IMPORTANT: added id -->
<section class="gallery fade-section" id="gallery">

<!-- YOUR EXISTING STATIC CARDS (UNCHANGED) -->
<div class="card" onclick="openModal(this)">
  <img src="images/wedding.jpg">
  <div class="overlay">
    <h3>Wedding Tent</h3>
    <p>Displays aspiration through fabric, lighting, and scale.</p>
  </div>
</div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <img class="modal-content" id="modal-img">
  <div id="modal-caption"></div>
</div>

<footer>
Ephemeral Delhi — Archive
</footer>

<!-- 🔥 NEW FIREBASE SCRIPT -->
<script type="module">

import { fetchArchiveData } from "./firebase.js";

const gallery = document.getElementById("gallery");

async function loadFirebaseData() {

  const data = await fetchArchiveData();

  data.forEach(item => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.imageUrl}">
      <div class="overlay">
        <h3>${item.type || "Structure"}</h3>
        <p>${item.location || ""}</p>
      </div>
    `;

    card.onclick = () => openModal(card);

    gallery.appendChild(card);
  });
}

loadFirebaseData();

</script>

<script>

/* MODAL */
function openModal(card) {
  document.getElementById("modal").style.display = "block";
  document.getElementById("modal-img").src = card.querySelector("img").src;
  document.getElementById("modal-caption").innerHTML =
    card.querySelector("h3").innerText + " — " +
    card.querySelector("p").innerText;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* SCROLL ANIMATION */
const sections = document.querySelectorAll('.fade-section');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
}, { threshold: 0.2 });

sections.forEach(section => observer.observe(section));

</script>

</body>
</html>
