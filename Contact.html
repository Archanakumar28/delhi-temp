<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Ephemeral Delhi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins'; background:#E0CFC2; color:#62191C; }
nav { display:flex; justify-content:space-between; padding:20px 50px; background:#62191C; color:#E0CFC2;}
nav ul { display:flex; gap:20px; list-style:none;}
nav a { color:#E0CFC2; text-decoration:none;}

.contact-hero {
  height:40vh;
  background:linear-gradient(rgba(98,25,28,0.8),rgba(98,25,28,0.8)),url('images/contact-bg.jpg');
  display:flex; align-items:center; justify-content:center;
  color:#E0CFC2;
}

.container { max-width:1100px; margin:auto; padding:60px 20px; }
.contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:40px;}

.card { background:#CAAE9F; padding:30px; border-radius:20px; }

form { display:flex; flex-direction:column; }
input, textarea { margin-bottom:15px; padding:12px; border-radius:10px; border:none;}
button { padding:12px; background:#62191C; color:#E0CFC2; border-radius:25px; cursor:pointer;}

footer { text-align:center; padding:20px; background:#62191C; color:#E0CFC2;}
</style>
</head>

<body>

<nav>
  <h1>Ephemeral Delhi</h1>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="archive.html">Archive</a></li>
    <li><a href="map.html">Map</a></li>
    <li><a href="analysis.html">Analysis</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<section class="contact-hero">
  <h2>Contact & Contribute</h2>
</section>

<div class="container">

<div class="contact-grid">

<div class="card">
  <h3>Get in Touch</h3>
  <p>Email: ephemeraldelhi@gmail.com</p>
</div>

<div class="card">
  <h3>Write to Us</h3>

  <form id="contactForm">
    <input type="text" id="contactName" placeholder="Your Name" required>
    <input type="email" id="contactEmail" placeholder="Your Email" required>
    <textarea id="contactMessage" placeholder="Your Message"></textarea>
    <button type="submit">Send Message</button>
  </form>

</div>

</div>

<div class="card" style="margin-top:40px;">
  <h3>Contribute to Archive</h3>

  <form id="archiveForm">
    <input type="text" id="archiveName" placeholder="Your Name">
    <input type="text" id="archiveLocation" placeholder="Location">
    <input type="text" id="archiveType" placeholder="Type">
    <textarea id="archiveDesc" placeholder="Description"></textarea>
    <button type="submit">Submit</button>
  </form>

</div>

</div>

<footer>
Ephemeral Delhi — Documenting what disappears
</footer>

<!-- FIREBASE CONNECTION -->
<script type="module">
import { submitContactForm, submitArchiveForm } from "./firebase.js";

// CONTACT
document.getElementById("contactForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  await submitContactForm(
    contactName.value,
    contactEmail.value,
    contactMessage.value
  );

  alert("Message sent!");
  e.target.reset();
});

// ARCHIVE
document.getElementById("archiveForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  await submitArchiveForm(
    archiveName.value,
    archiveLocation.value,
    archiveType.value,
    archiveDesc.value
  );

  alert("Submitted for review!");
  e.target.reset();
});
</script>

</body>
</html>
