<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Ephemeral Delhi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #E0CFC2;
  color: #62191C;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: #62191C;
  color: #E0CFC2;
}

nav ul {
  display: flex;
  list-style: none;
  gap: 20px;
}

nav a {
  color: #E0CFC2;
  text-decoration: none;
}

/* HERO */
.contact-hero {
  height: 40vh;
  background: linear-gradient(rgba(98,25,28,0.8), rgba(98,25,28,0.8)),
              url('images/contact-bg.jpg');
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #E0CFC2;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 60px 20px;
}

/* GRID */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

/* CARD */
.card {
  background: #CAAE9F;
  padding: 30px;
  border-radius: 20px;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
}

input, textarea {
  margin-bottom: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

input[type="file"] {
  background: #E0CFC2;
}

button {
  padding: 12px;
  background: #62191C;
  color: #E0CFC2;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #873632;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #62191C;
  color: #E0CFC2;
  margin-top: 40px;
}

/* RESPONSIVE */
@media(max-width: 768px) {
  .contact-grid {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <h1>Ephemeral Delhi</h1>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="archive.html">Archive</a></li>
    <li><a href="map.html">Map</a></li>
    <li><a href="analysis.html">Analysis</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="contact-hero">
  <h2>Contact & Contribute</h2>
</section>

<div class="container">

<div class="contact-grid">

<!-- CONTACT INFO -->
<div class="card">
  <h3>Get in Touch</h3>
  <p>Email: ephemeraldelhi@gmail.com</p>
  <p>Location: Delhi, India</p>
</div>

<!-- CONTACT FORM -->
<div class="card">
  <h3>Write to Us</h3>

  <form action="https://formspree.io/f/abcdxyz" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Your Message"></textarea>

    <input type="hidden" name="formType" value="contact">

    <button type="submit">Send Message</button>
  </form>

</div>

</div>

<!-- ARCHIVE SUBMISSION -->
<div class="card" style="margin-top:40px;">
  <h3>Contribute to Archive</h3>

  <form action="https://formspree.io/f/abcdxyz" 
        method="POST" 
        enctype="multipart/form-data">

    <input type="text" name="name" placeholder="Your Name">
    <input type="text" name="location" placeholder="Location (CR Park, etc.)">
    <input type="text" name="type" placeholder="Type (Religious / Social / Political / Commercial)">
    
    <!-- IMAGE UPLOAD -->
    <input type="file" name="image" accept="image/*">

    <textarea name="description" placeholder="Description"></textarea>

    <input type="hidden" name="formType" value="archive">

    <button type="submit">Submit to Archive</button>
  </form>

</div>

</div>

<footer>
Ephemeral Delhi — Documenting what disappears
</footer>

</body>
</html>
